<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — ATIVUZ</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='favicon.png') }}">
  <link rel="preconnect" href="https://api.fontshare.com" crossorigin>
  <link rel="stylesheet" href="{{ url_for('static', filename='tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <div class="login-wrap">

    <form class="login-card fade-in" method="POST" action="{{ url_for('login') }}" novalidate>

      <img src="{{ url_for('static', filename='ativuz-logo.png') }}"
           alt="ATIVUZ Veículos" class="login-logo">

      <h1 class="login-title">Acesse sua conta</h1>
      <p class="login-sub">Gestão e controle de frotas B2B.</p>

      <div class="login-fields">

        <div class="field">
          <label for="nome">Login</label>
          <div class="input-group">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <input id="nome" class="input" type="text" name="nome"
                   autocomplete="username" placeholder="Seu nome de usuário"
                   required autofocus aria-required="true">
          </div>
        </div>

        <div class="field">
          <label for="senha">Senha</label>
          <div class="input-group">
            <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <input id="senha" class="input" type="password" name="senha"
                   autocomplete="current-password" placeholder="••••••••••"
                   required aria-required="true">
            <button type="button" class="suffix" id="toggle-pass"
                    aria-label="Mostrar/ocultar senha"
                    style="background:none;border:none;padding:4px 8px;color:var(--ink-3);cursor:pointer;display:grid;place-items:center;">
              <svg id="eye-icon" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                <circle cx="12" cy="12" r="3"/>
              </svg>
            </button>
          </div>
        </div>

        {% if erro %}
        <div class="badge badge-danger" style="height:auto;padding:9px 12px;align-self:flex-start;" role="alert">
          <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="10"/>
            <line x1="12" y1="8" x2="12" y2="12"/>
            <line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          {{ erro }}
        </div>
        {% endif %}

        <button type="submit" class="btn btn-primary login-btn">
          Entrar
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24" aria-hidden="true">
            <line x1="5" y1="12" x2="19" y2="12"/>
            <polyline points="12 5 19 12 12 19"/>
          </svg>
        </button>

      </div>

      <div class="login-foot">
        Ainda não tem acesso?
        <a href="mailto:ativuz.veiculos@gmail.com" class="link">Solicitar acesso</a>
      </div>

    </form>

    <div class="login-copy">© 2026 Ativuz Veículos · Gestão de frotas B2B</div>

  </div>

  <script>
    var toggleBtn = document.getElementById('toggle-pass');
    var senhaInput = document.getElementById('senha');
    var eyeIcon = document.getElementById('eye-icon');
    if (toggleBtn && senhaInput) {
      toggleBtn.addEventListener('click', function () {
        var isText = senhaInput.type === 'text';
        senhaInput.type = isText ? 'password' : 'text';
        eyeIcon.innerHTML = isText
          ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
          : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        toggleBtn.setAttribute('aria-label', isText ? 'Mostrar senha' : 'Ocultar senha');
      });
    }
  </script>

</body>
</html>
