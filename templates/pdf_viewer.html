<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ nome_arquivo }}</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f1f5f9; }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1e3a5f; padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    #toolbar button {
      background: #b91c1c; color: #fff; border: none; border-radius: 6px;
      padding: 7px 16px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    #toolbar button:disabled { opacity: 0.6; cursor: default; }
    #toolbar span { color: #cbd5e1; font-size: 0.82rem; }
    #status-msg { color: #fbbf24; font-size: 0.82rem; font-weight: 600; }

    #conteudo {
      max-width: 794px; margin: 72px auto 40px;
      background: #fff; padding: 50px 60px;
      box-shadow: 0 4px 20px rgba(0,0,0,.1);
      min-height: 200px;
    }

    /* Estilos do documento */
    #conteudo p  { margin-bottom: 8px; line-height: 1.6; }
    #conteudo h1 { font-size: 1.4rem; margin-bottom: 12px; }
    #conteudo h2 { font-size: 1.2rem; margin-bottom: 10px; margin-top: 16px; }
    #conteudo h3 { font-size: 1.05rem; margin-bottom: 8px; margin-top: 12px; }
    #conteudo table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
    #conteudo td, #conteudo th {
      border: 1px solid #d1d5db; padding: 5px 8px;
      font-size: 0.9rem; vertical-align: top;
    }
    #conteudo th { background: #f8fafc; font-weight: 600; }
    #conteudo ul, #conteudo ol { padding-left: 1.5rem; margin-bottom: 8px; }
    #conteudo li { margin-bottom: 4px; line-height: 1.5; }
    #conteudo strong { font-weight: 700; }
    #conteudo em { font-style: italic; }

    @media print {
      #toolbar { display: none; }
      #conteudo { margin: 0; box-shadow: none; padding: 20px; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-baixar" onclick="baixarPDF()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Baixar PDF
    </button>
    <span>{{ nome_arquivo }}</span>
    <span id="status-msg"></span>
  </div>

  <div id="conteudo">
    {{ html_content | safe }}
  </div>

  <script>
    function baixarPDF() {
      const btn = document.getElementById('btn-baixar');
      const msg = document.getElementById('status-msg');
      btn.disabled = true;
      msg.textContent = 'Gerando…';

      const elemento = document.getElementById('conteudo');
      html2pdf().set({
        margin:      [12, 15, 12, 15],
        filename:    '{{ nome_arquivo }}',
        image:       { type: 'jpeg', quality: 0.98 },
        html2canvas: { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:       { unit: 'mm', format: 'a4', orientation: 'portrait' }
      }).from(elemento).save().then(() => {
        btn.disabled = false;
        msg.textContent = '✓ Download concluído';
        setTimeout(() => { msg.textContent = ''; }, 3000);
      });
    }

    // Auto-download ao carregar
    window.addEventListener('load', () => setTimeout(baixarPDF, 800));
  </script>
</body>
</html>
