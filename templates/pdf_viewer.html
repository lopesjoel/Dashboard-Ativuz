<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ nome_arquivo }}</title>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx-preview@0.1.22/dist/docx-preview.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f1f5f9; }

    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: #1e3a5f; padding: 10px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    #toolbar button {
      background: #b91c1c; color: #fff; border: none; border-radius: 6px;
      padding: 7px 16px; font-weight: 600; font-size: 0.85rem; cursor: pointer;
      display: flex; align-items: center; gap: 6px;
    }
    #toolbar button:disabled { opacity: 0.6; cursor: default; }
    #toolbar .nome { color: #cbd5e1; font-size: 0.82rem; }
    #status-msg { color: #fbbf24; font-size: 0.82rem; font-weight: 600; }

    #wrapper {
      max-width: 860px; margin: 72px auto 40px;
      background: #fff;
      box-shadow: 0 4px 20px rgba(0,0,0,.12);
      min-height: 200px;
    }

    /* docx-preview injeta seus próprios estilos no container */
    #conteudo { width: 100%; }

    @media print {
      #toolbar { display: none !important; }
      #wrapper { margin: 0; box-shadow: none; max-width: 100%; }
      body { background: #fff; }
    }
  </style>
</head>
<body>
  <div id="toolbar">
    <button id="btn-baixar" onclick="baixarPDF()">
      <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"
           viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
        <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
      Baixar PDF
    </button>
    <span class="nome">{{ nome_arquivo }}</span>
    <span id="status-msg">Carregando…</span>
  </div>

  <div id="wrapper">
    <div id="conteudo"></div>
  </div>

  <script>
    const b64 = "{{ docx_b64 | safe }}";

    function b64toBlob(b64str) {
      try {
        const bin = atob(b64str);
        const arr = new Uint8Array(bin.length);
        for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
        return new Blob([arr], { type: "application/vnd.openxmlformats-officedocument.wordprocessingml.document" });
      } catch(e) {
        return null;
      }
    }

    function renderDoc() {
      if (typeof docx === "undefined") {
        document.getElementById("status-msg").textContent = "❌ Erro: biblioteca não carregou.";
        return;
      }
      const blob = b64toBlob(b64);
      if (!blob) {
        document.getElementById("status-msg").textContent = "❌ Erro ao decodificar documento.";
        return;
      }
      docx.renderAsync(blob, document.getElementById("conteudo"), null, {
        className: "docx-preview",
        inWrapper: true,
        ignoreWidth: false,
        ignoreHeight: false,
        breakPages: true,
        useBase64URL: true,
        renderEndnotes: true,
        renderFootnotes: true,
        renderFooters: true,
        renderHeaders: true,
      }).then(() => {
        document.getElementById("status-msg").textContent = "";
      }).catch(err => {
        document.getElementById("status-msg").textContent = "❌ Erro ao renderizar: " + err.message;
        console.error(err);
      });
    }

    window.addEventListener("load", renderDoc);

    function baixarPDF() {
      window.print();
    }
  </script>
</body>
</html>
