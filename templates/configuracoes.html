{% extends "base.html" %}
{% block title %}Configurações — ATIVUZ{% endblock %}

{% block head %}
<style>
  .cfg-page { max-width: 640px; }

  .cfg-section-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .08em;
    color: var(--ink-3);
    margin-bottom: 12px;
  }

  .cfg-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--d-radius);
    overflow: hidden;
    box-shadow: var(--shadow-sm);
  }

  .cfg-row {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 18px 20px;
  }
  .cfg-row + .cfg-row {
    border-top: 1px solid var(--line);
  }

  .cfg-row-icon {
    width: 36px; height: 36px;
    border-radius: 9px;
    background: var(--line-2);
    display: grid;
    place-items: center;
    color: var(--ink-3);
    flex-shrink: 0;
  }

  .cfg-row-body { flex: 1; min-width: 0; }
  .cfg-row-label {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
  }
  .cfg-row-desc {
    font-size: 12px;
    color: var(--ink-3);
    margin-top: 2px;
  }

  /* Toggle switch */
  .toggle {
    position: relative;
    width: 44px;
    height: 24px;
    flex-shrink: 0;
  }
  .toggle input { opacity: 0; width: 0; height: 0; position: absolute; }
  .toggle-track {
    position: absolute;
    inset: 0;
    background: var(--line);
    border-radius: 12px;
    cursor: pointer;
    transition: background .2s ease;
  }
  .toggle-track::after {
    content: '';
    position: absolute;
    top: 3px; left: 3px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.2);
    transition: transform .2s ease;
  }
  .toggle input:checked + .toggle-track {
    background: var(--brand-orange);
  }
  .toggle input:checked + .toggle-track::after {
    transform: translateX(20px);
  }
  .toggle input:focus-visible + .toggle-track {
    outline: 2px solid var(--brand-orange);
    outline-offset: 2px;
  }
</style>
{% endblock %}

{% block content %}
<div class="cfg-page">

  <div style="margin-bottom: 24px;">
    <h1 style="font-size:20px; font-weight:700; color:var(--ink);">Configurações</h1>
    <p style="font-size:13px; color:var(--ink-3); margin-top:4px;">Personalize a aparência e o comportamento do sistema.</p>
  </div>

  <!-- Aparência -->
  <div style="margin-bottom: 28px;">
    <div class="cfg-section-title">Aparência</div>
    <div class="cfg-card">
      <div class="cfg-row">
        <div class="cfg-row-icon">
          <svg width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </div>
        <div class="cfg-row-body">
          <div class="cfg-row-label">Modo escuro</div>
          <div class="cfg-row-desc">Reduz o brilho da interface para ambientes com pouca luz.</div>
        </div>
        <label class="toggle" aria-label="Ativar modo escuro">
          <input type="checkbox" id="dark-mode-toggle">
          <span class="toggle-track"></span>
        </label>
      </div>
    </div>
  </div>

</div>

<script>
(function () {
  var toggle = document.getElementById('dark-mode-toggle');
  var html = document.documentElement;

  toggle.checked = html.getAttribute('data-theme') === 'dark';

  toggle.addEventListener('change', function () {
    if (toggle.checked) {
      html.setAttribute('data-theme', 'dark');
      localStorage.setItem('ativuz-theme', 'dark');
    } else {
      html.removeAttribute('data-theme');
      localStorage.removeItem('ativuz-theme');
    }
  });
})();
</script>
{% endblock %}
